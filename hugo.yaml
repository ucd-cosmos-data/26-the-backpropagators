baseURL: https://ucd-cosmos-data.github.io/26-the-backpropagators/
locale: en-us
title: "The Backpropagators"
theme: ["PaperMod"]

params:
  defaultTheme: auto
  disableThemeToggle: true
  ShowToc: false
  assets:
    favicon: bonsai.jpeg #the small icon shown in the browser tab
  socialIcons:
    - name: github
      url: "https://github.com/ucd-cosmos-data/26-the-backpropagators"
  math: False # set to `true` in a page's own front matter if it needs LaTeX rendering
  profileMode:
    enabled: true
    title: "The Backpropagators"
    subtitle: "UC Davis COSMOS · Cluster 11 — turning data into insight, one project at a time."
    imageUrl: "/26-the-backpropagators/ucd.png"    
    imageWidth: 300
    imageHeight: 300

menu:
  main:
    - identifier: Members
      name: Members
      url: /members/
      weight: 10
    - identifier: Project
      name: Project
      url: /project/
      weight: 20
    - identifier: Logs
      name: Logs
      url: /logs/
      weight: 30
    - identifier: Photos
      name: Photos
      url: /photos/
      weight: 40
    - identifier: TEST
      name: TEST
      url: /test/
      weight: 50
    - identifier: course-site
      name: Course Website
      url: https://ucd-cosmos-data.github.io/

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block:
          - - $$
            - $$
        enable: true