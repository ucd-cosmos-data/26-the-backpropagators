{{ if .Get "summary" }}
{{ else }}
{{ warnf "missing value for param 'summary': %s" .Position }}
{{ end }}
<details{{ with .Get "class" }} class="{{ . }}"{{ end }} {{ if (eq (.Get "openByDefault") true) }} open{{ end }}>
  <summary markdown="span">{{ .Get "summary" | markdownify }}</summary>
  <div{{ with .Get "contentClass" }} class="{{ . }}"{{ end }}>{{ .Inner | markdownify }}</div>
</details>
