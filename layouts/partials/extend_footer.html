<script>
(function () {
  if (!window.matchMedia('(hover: hover) and (pointer: fine)').matches) return;

  var dot = document.createElement('div');
  dot.id = 'cursor-dot';
  var ring = document.createElement('div');
  ring.id = 'cursor-ring';
  document.body.appendChild(ring);
  document.body.appendChild(dot);
  document.documentElement.classList.add('cursor-ready');

  var mouseX = 0, mouseY = 0, ringX = 0, ringY = 0, started = false;

  window.addEventListener('mousemove', function (e) {
    mouseX = e.clientX;
    mouseY = e.clientY;
    dot.style.left = mouseX + 'px';
    dot.style.top = mouseY + 'px';
    if (!started) {
      started = true;
      ringX = mouseX;
      ringY = mouseY;
    }
  });

  function loop() {
    ringX += (mouseX - ringX) * 0.18;
    ringY += (mouseY - ringY) * 0.18;
    ring.style.left = ringX + 'px';
    ring.style.top = ringY + 'px';
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  var interactive = 'a, button, .project-card, .quicklink-card, .member-card, .button';
  document.addEventListener('mouseover', function (e) {
    if (e.target.closest(interactive)) document.body.classList.add('cursor-hover');
  });
  document.addEventListener('mouseout', function (e) {
    if (e.target.closest(interactive)) document.body.classList.remove('cursor-hover');
  });
})();
</script>
